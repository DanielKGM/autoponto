services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env.prod}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER obrigatoria no .env.prod}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD obrigatoria no .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:?DATABASE_USER obrigatoria no .env.prod} -d ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env.prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${FACE_EMBEDDING_CACHE_PASSWORD:?FACE_EMBEDDING_CACHE_PASSWORD obrigatoria no .env.prod}",
        "--appendonly",
        "no",
        "--save",
        "",
        "--protected-mode",
        "yes",
      ]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${FACE_EMBEDDING_CACHE_PASSWORD:?FACE_EMBEDDING_CACHE_PASSWORD obrigatoria no .env.prod} ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./autoponto-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./autoponto-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL obrigatoria no .env.prod}
        VITE_BASE_PATH: ${VITE_BASE_PATH:?VITE_BASE_PATH obrigatoria no .env.prod}
        NGINX_CONF: nginx.prod.conf
    restart: unless-stopped
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8088:80"

volumes:
  postgres_data:
