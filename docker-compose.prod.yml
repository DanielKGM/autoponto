services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env.prod}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER obrigatoria no .env.prod}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD obrigatoria no .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:?DATABASE_USER obrigatoria no .env.prod} -d ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env.prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./autoponto-backend
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./autoponto-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL obrigatoria no .env.prod}
        VITE_BASE_PATH: ${VITE_BASE_PATH:?VITE_BASE_PATH obrigatoria no .env.prod}
        NGINX_CONF: nginx.prod.conf
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8088:80"

volumes:
  postgres_data:
