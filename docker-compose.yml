services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-autoponto}
      POSTGRES_USER: ${DATABASE_USER:-autoponto}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-autoponto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-autoponto} -d ${DATABASE_NAME:-autoponto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./autoponto-backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      TIME_ZONE: ${TIME_ZONE:-America/Sao_Paulo}
      DATABASE_NAME: ${DATABASE_NAME:-autoponto}
      DATABASE_USER: ${DATABASE_USER:-autoponto}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-autoponto}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-15}
      JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-1}
      EDGE_SYNC_DAYS_BACK: ${EDGE_SYNC_DAYS_BACK:-1}
      EDGE_SYNC_DAYS_FORWARD: ${EDGE_SYNC_DAYS_FORWARD:-7}
      INTERSCITY_ENABLED: ${INTERSCITY_ENABLED:-False}
      INTERSCITY_BASE_URL: ${INTERSCITY_BASE_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh}
      INTERSCITY_CATALOG_URL: ${INTERSCITY_CATALOG_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/catalog}
      INTERSCITY_DISCOVERY_URL: ${INTERSCITY_DISCOVERY_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/discovery}
      INTERSCITY_COLLECTOR_URL: ${INTERSCITY_COLLECTOR_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/collector}
      INTERSCITY_ADAPTOR_URL: ${INTERSCITY_ADAPTOR_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/adaptor}
      INTERSCITY_ACTUATOR_URL: ${INTERSCITY_ACTUATOR_URL:-https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/actuator}
      INTERSCITY_TIMEOUT_SECONDS: ${INTERSCITY_TIMEOUT_SECONDS:-5}
      FACE_DETECT_MODEL_PATH: ${FACE_DETECT_MODEL_PATH:-}
      FACE_RECOG_MODEL_PATH: ${FACE_RECOG_MODEL_PATH:-}
      FACE_SCORE_THRESHOLD: ${FACE_SCORE_THRESHOLD:-0.85}
      FACE_DUPLICATE_THRESHOLD: ${FACE_DUPLICATE_THRESHOLD:-0.92}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./autoponto-frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
