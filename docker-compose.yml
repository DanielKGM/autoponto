services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env da raiz}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER obrigatoria no .env da raiz}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD obrigatoria no .env da raiz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:?DATABASE_USER obrigatoria no .env da raiz} -d ${DATABASE_NAME:?DATABASE_NAME obrigatoria no .env da raiz}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "${FACE_EMBEDDING_CACHE_PASSWORD:?FACE_EMBEDDING_CACHE_PASSWORD obrigatoria no .env da raiz}",
        "--appendonly",
        "no",
        "--save",
        "",
        "--protected-mode",
        "yes",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${FACE_EMBEDDING_CACHE_PASSWORD:?FACE_EMBEDDING_CACHE_PASSWORD obrigatoria no .env da raiz} ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./autoponto-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./autoponto-frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL obrigatoria no .env da raiz}
        VITE_BASE_PATH: ${VITE_BASE_PATH:?VITE_BASE_PATH obrigatoria no .env da raiz}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
