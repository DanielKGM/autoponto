<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">ER Biometria Facial</title>
  <desc id="desc">Usuario possui zero ou muitos embeddings faciais; somente um embedding ativo por aluno.</desc>
  <defs>
    <style>
      .box { fill: #f7fafc; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .head { fill: #2563eb; }
      .title { fill: #fff; font: 700 16px Arial, sans-serif; }
      .text { fill: #1f2937; font: 14px Arial, sans-serif; }
      .line { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="box" x="60" y="70" width="210" height="120" />
  <rect class="head" x="60" y="70" width="210" height="36" />
  <text class="title" x="78" y="94">Usuario</text>
  <text class="text" x="78" y="132">id</text>
  <text class="text" x="78" y="156">papel = ALUNO</text>

  <rect class="box" x="430" y="45" width="230" height="170" />
  <rect class="head" x="430" y="45" width="230" height="36" />
  <text class="title" x="448" y="69">EmbeddingFacial</text>
  <text class="text" x="448" y="106">id</text>
  <text class="text" x="448" y="130">aluno_id</text>
  <text class="text" x="448" y="154">versao_modelo</text>
  <text class="text" x="448" y="178">vetor</text>
  <text class="text" x="448" y="202">ativo/status</text>

  <path class="line" d="M270 130 C330 130, 360 130, 430 130" />
  <text class="text" x="306" y="112">1 aluno</text>
  <text class="text" x="342" y="154">0..N embeddings</text>
  <text class="text" x="220" y="235">Restricao: apenas um EmbeddingFacial ativo por aluno.</text>
</svg>
